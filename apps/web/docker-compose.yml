# This is meant for local development only. Do not use this in production.
version: "3.8"

services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: "planetscale"
      MYSQL_USER: "planetscale_user"
      MYSQL_PASSWORD: "06072007"
    command:
      [
        "--max_connections=1000",
        "--default-authentication-plugin=mysql_native_password",
      ]
    ports:
      - 43307:3306
    volumes:
      - mysql:/var/lib/mysql
  proxy:
    image: ghcr.io/mattrobenolt/ps-http-sim:latest
    command:
      [
        # "-mysql-no-pass",
        "-listen-port=3900",
        "-mysql-dbname=planetscale",
        "-mysql-addr=mysql"
      ]
    depends_on:
      - mysql
    ports:
      - 3900:3900
    links:
      - mysql

  # mailhog:
  #   image: "mailhog/mailhog:latest"
  #   ports:
  #     - "1025:1025"
  #     - "8025:8025"

volumes:
  mysql:
